<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Calculadora</h2>

    <input type="text" id="num1" placeholder="Número 1">
    <input type="text" id="num2" placeholder="Número 2">

    <div class="botones">
        <button onclick="ejecutarOperacion('suma')"> Suma</button>
        <button onclick="ejecutarOperacion('resta')"> Resta</button>
        <button onclick="ejecutarOperacion('multiplicacion')"> Multiplicación</button>
        <button onclick="ejecutarOperacion('division')"> División</button>
    </div>

    <div id="resultado"></div>

    <h3>Historial</h3>
    <ul id="historial"></ul>
</div>

<script src="java.js"></script>
</body>
</html>
